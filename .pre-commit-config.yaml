repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        description: "Run 'ruff' for extremely fast Python linting"
        entry: uvx ruff check
        language: system
        types: [python]
        require_serial: true
        args:
          - --force-exclude
          - --fix
          - --exit-non-zero-on-fix

      - id: ruff-format
        name: ruff-format
        description: "Run 'ruff format' for extremely fast Python formatting"
        entry: uvx ruff format
        language: system
        types: [python]
        require_serial: true
        args:
          - --force-exclude
